name: Deploy Quartz site to GitHub Pages
 
on:
  push:
    branches:
      - v5
 
env:
  THEME_NAME: transparent

permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for git info
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install Dependencies
        run: npm ci
      - name: Install Quartz plugins
        run: |
          rm -rf .quartz/plugins
          npx quartz plugin install
      - name: Apply content-index plugin patches
        run: |
          cp ./plugins-patches/content-index-emitter.ts .quartz/plugins/content-index/src/emitter.ts
      - name: Rebuild content-index plugin with order support
        run: |
          cd .quartz/plugins/content-index
          npm install
          npm run build
          cd ../../..
      - name: Apply dist file patches (backup)
        run: |
          cp ./plugins-patches/content-index-index.js .quartz/plugins/content-index/dist/index.js
          cp ./plugins-patches/content-index-index.d.ts .quartz/plugins/content-index/dist/index.d.ts
      - name: Fetch Quartz Theme
        run: curl -s -S https://raw.githubusercontent.com/saberzero1/quartz-themes/master/action.sh | bash -s -- $THEME_NAME
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
 
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4